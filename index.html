<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База Героев</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #00adb5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
        }

        /* Панель управления */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .control-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
        }

        input, select {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        /* Сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Карточка */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .avatar-container {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Соотношение сторон 1:1 */
            background-color: #111;
        }

        .avatar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background-color: #111;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            color: #fff;
        }
		.hero-badges-container {
			display: flex;
			gap: 4px;
		}
		.hero-badges {
			display: flex;
			flex-wrap: wrap;
			gap: 4px;
		}
		.badge {
            display: inline-flex;
			background-color: var(--accent);
            color: #1a1a1a;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            align-self: flex-start;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 14px;
            border-top: 1px solid #444;
            padding-top: 12px;
            margin-top: auto;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
        }

        .info-value {
            font-weight: 500;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>База Данных Персонажей</h1>

    <!-- Панель управления -->
    <div class="controls">
        <div class="control-group">
            <label for="search">Поиск по имени</label>
            <input type="text" id="search" placeholder="Введите имя...">
        </div>
        <div class="control-group">
            <label for="filterType">Тип персонажа</label>
            <select id="filterType">
                <option value="all">Все типы</option>
				<option value="MAIN">Главный герой</option>
                <option value="SECONDARY">Биом</option>
                <option value="CONTRACT">Контракт</option>
				<option value="HUNT">Охота</option>
				<option value="PREMIUM">Премиум</option>
             </select>
        </div>
        <div class="control-group">
            <label for="sortBaseID">Сортировка (BaseID)</label>
            <select id="sortBaseID">
                <option value="none">Без сортировки</option>
                <option value="asc">По возрастанию</option>
                <option value="desc">По убыванию</option>
            </select>
        </div>
    </div>

    <!-- Сетка с карточками -->
    <div class="grid" id="heroesGrid"></div>
</div>

<script>
    let heroesData = [];
    const grid = document.getElementById('heroesGrid');
    const searchInput = document.getElementById('search');
    const filterType = document.getElementById('filterType');
    const sortClass = document.getElementById('sortClass');

	const classMapper = {
	    1: 'Сила',
	    2: 'Ловкость',
	    3: 'Интеллект'
	};
	const allianceMapper = {
		1: 'Осквернитель',
		2: 'Жрец',
		3: 'Убийца',
		4: 'Боец',
		5: 'Защитник'
	};
	const raceMapper = {
		1: 'Люди',
		2: 'Звери',
		3: 'Гномы',
		4: 'Демоны',
		5: 'Нежить',
		6: 'Эльфы',
		7: 'Орки',
		8: 'Механизмы',
		9: 'Энты',
		10: 'Перворожденные'
	};
	const typeMapper = {
		'MAIN': 'ГЛАВНЫЙ ГЕРОЙ',
	    'HUNT': 'ОХОТА',
	    'CONTRACT': 'КОНТРАКТ',
	    'SECONDARY': 'БИОМ',
		'PREMIUM': 'ПРЕМИУМ'
	};
	
    // Исправлено: Загрузка данных и вызов отрисовки
    async function loadHeroes() {
        try {
            const response = await fetch('herous.json');
            if (!response.ok) throw new Error('Ошибка сети');
            heroesData = await response.json();
            renderCards(heroesData);
        } catch (error) {
            grid.innerHTML = `<div class="no-results">Ошибка: ${error.message}</div>`;
        }
    }

    // Исправлено: Отрисовка карточек
    function renderCards(data) {
        grid.innerHTML = '';
        if (data.length === 0) {
            grid.innerHTML = '<div class="no-results">Персонажи не найдены</div>';
            return;
        }

        data.forEach(hero => {
            // Очищаем строки от лишних пробелов на краях для красивого вывода
            const cleanName = hero.name.trim();
            const cleanType = hero.character_type.trim();
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="avatar-container">
                    <img class="avatar" src="${hero.avatar}" alt="${cleanName}" loading="lazy">
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <img class="icon" src="${hero.icon}" alt="icon">
                        <h2 class="name">${cleanName}</h2>
                    </div>
					<div class="hero-badges-container">
						<div class="hero-badges">
							<span class="badge" style="background: #6FECD3;">${typeMapper[cleanType] || cleanType}</span>
		                    <span class="badge" style="background: #FF5C5C;">${classMapper[hero.class_id] || hero.class_id}</span>
						</div>
		                <div class="hero-badges">
							<span class="badge" style="background: #4A90E2;">${raceMapper[hero.race_id] || hero.race_id}</span>
		                    <span class="badge" style="background: #F7BF64;">${allianceMapper[hero.alliance_id] || hero.alliance_id}</span>
						</div>
					</div>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">Base ID</span>
                            <span class="info-value">${hero.base_character_id}</span>
                        </div>

						<div class="info-item">
                            <span class="info-label">MAX Star</span>
                            <span class="info-value">${'★'.repeat(hero.max_stardom || 0)}</span>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    // Функция обработки поиска, фильтрации и сортировки
    function updateDisplay() {
        let updatedList = [...heroesData];

        // 1. Поиск (по совпадению подстроки в имени без учета регистра)
        const searchValue = searchInput.value.toLowerCase().trim();
        if (searchValue) {
            updatedList = updatedList.filter(hero => 
                hero.name.toLowerCase().includes(searchValue)
            );
        }

        // 2. Фильтрация по типу
        const typeValue = filterType.value;
        if (typeValue !== 'all') {
            updatedList = updatedList.filter(hero => 
                hero.character_type.trim() === typeValue
            );
        }

        // 3. Сортировка по class_id
        const sortValue = sortBaseID.value;
        if (sortValue === 'asc') {
            updatedList.sort((a, b) => a.BaseID - b.BaseID);
        } else if (sortValue === 'desc') {
            updatedList.sort((a, b) => b.BaseID - a.BaseID);
        }

        renderCards(updatedList);
    }

    // Слушатели событий управления
    searchInput.addEventListener('input', updateDisplay);
	filterType.addEventListener('change', updateDisplay);
	sortBaseID.addEventListener('change', updateDisplay);
    
    // Инициализация
    loadHeroes();
</script>

</body>
</html>
